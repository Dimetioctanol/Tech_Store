services:
  postgres:
    image: postgres:15
    container_name: techstore_db
    environment:
      POSTGRES_USER: techstore_user
      POSTGRES_PASSWORD: techstore_pass
      POSTGRES_DB: techstore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
